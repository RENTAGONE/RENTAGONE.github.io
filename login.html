<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RENTAGONE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="particles" id="particles"></div>
    <div class="toast-container" id="toastContainer"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">💎 RENTAGONE</a>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="order.html">Order</a></li>
        </ul>
        <div class="nav-btns">
            <a href="register.html" class="btn btn-primary btn-sm">Register</a>
        </div>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="auth-page">
        <div class="auth-box animate-on-scroll animate-scale">
            <h2>🔐 Welcome Back</h2>
            <p class="auth-subtitle">Login to your RENTAGONE account</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" required>
                    <div class="form-error" id="loginEmailError">Please enter a valid email</div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" required>
                    <div class="form-error" id="loginPasswordError">Password is required</div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="loginBtn">
                    Login
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
