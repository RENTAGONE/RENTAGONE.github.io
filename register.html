<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RENTAGONE - Register</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<h1>💎 RENTAGONE Register 💎</h1>

<form id="registerForm">
  <label>Username:</label><br>
  <input type="text" id="username" required><br>

  <label>Email:</label><br>
  <input type="email" id="email" required><br>

  <label>Password:</label><br>
  <input type="password" id="password" required><br>

  <label>Roblox Username:</label><br>
  <input type="text" id="roblox" required><br>

  <button type="submit">Register</button>
</form>

<p id="status"></p>

<script>
  const supabaseUrl = "https://cnfkccnjisytmzjugftc.supabase.co";
  const supabaseKey = "sb_publishable_vxGaJqrwippDGNrRccqWOw_f6nRX2HW";
  const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

  const form = document.getElementById('registerForm');
  const status = document.getElementById('status');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const roblox_username = document.getElementById('roblox').value;

    const { data, error } = await supabase
      .from('users')
      .insert([{ username, email, password, roblox_username }]);

    if (error) {
      status.textContent = "Error: " + error.message;
    } else {
      status.textContent = "✅ Registered! You can now log in.";
      form.reset();
    }
  });
</script>
</body>
</html>
